kind = "web"
previewPath = "/"
title = "AL JUDE Travel — Internal Portal"
version = "1.0.0"
id = "artifacts/travel-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25433

[services.development]
run = "pnpm --filter @workspace/travel-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-portal", "run", "build" ]
publicDir = "artifacts/travel-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25433"
BASE_PATH = "/"
